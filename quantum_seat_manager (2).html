/* ================================================

const ROOM_SECTIONS = [

/* ================================================

/* ================================================

let S = {

  adminUser: null,

  searchQ: '',

/* ================================================
   Firebase 작업
   ================================================ */
async function searchStudentFB(query) {
  query = query.trim();
  if (!query) return null;
  // ID로 검색
  const byId = await db.collection('students').doc(query).get();
  if (byId.exists) return byId.data();
  // 이름으로 검색
  const byName = await db.collection('students').where('name','==',query).limit(1).get();
  if (!byName.empty) return byName.docs[0].data();
  return null;
}

async function loadStudentRequests(studentId) {
  const snap = await db.collection('requests').where('studentId','==',studentId)
    .orderBy('date','desc').limit(10).get();
  return snap.docs.map(d => ({id:d.id,...d.data(), date: d.data().date?.toDate?.()?.toISOString() || d.data().date}));
}

async function submitRequestFB(req) {
  await db.collection('requests').add({
    ...req,
    status: 'pending',
    rejectReason: '',
    date: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

async function approveRequestFB(reqId, req) {
  const batch = db.batch();
  batch.update(db.collection('requests').doc(reqId), {status:'approved'});
  batch.update(db.collection('students').doc(req.studentId), {
    room: req.desiredRoom,
    seat: req.desiredSeat,
  });
  await batch.commit();
}

async function rejectRequestFB(reqId, reason) {
  await db.collection('requests').doc(reqId).update({
    status: 'rejected',
    rejectReason: reason || '',
  });
}

async function loadAllStudentsFB() {
  const snap = await db.collection('students').get();
  return snap.docs.map(d => d.data());
}

async function saveStudentsFB(students) {
  const CHUNK = 400;
  for (let i=0; i<students.length; i+=CHUNK) {
    const batch = db.batch();
    students.slice(i, i+CHUNK).forEach(s => {
      batch.set(db.collection('students').doc(s.id), s);
    });
    await batch.commit();
  }
}

function subscribeRequests() {
  if (S.reqListener) S.reqListener();
  S.reqListener = db.collection('requests').orderBy('date','desc')
    .onSnapshot(snap => {
      S.requests = snap.docs.map(d => ({
        id: d.id, ...d.data(),
        date: d.data().date?.toDate?.()?.toISOString() || d.data().date,
      }));
      render();
    });
}

/* ================================================
   Excel 파싱 / 다운로드
   ================================================ */
function parseExcel(buffer) {
  try {
    const wb = XLSX.read(buffer);
    const ws = wb.Sheets['Master'];
    if (!ws) return {students:[], error:'Master 시트를 찾을 수 없습니다'};
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
    const students = [];
    for (let i=1; i<rows.length; i++) {
      const r = rows[i];
      if (!r || r[4]==null) continue;
      const id   = String(r[3]??'').trim();
      const name = String(r[4]??'').trim();
      const gender = String(r[5]??'').trim();
      const room   = String(r[6]??'').trim();
      const seat   = parseInt(r[7]);
      if (id && name && room && !isNaN(seat))
        students.push({id, name, gender, room, seat});
    }
    return {students, error:null};
  } catch(e) { return {students:[], error:e.message}; }
}

async function downloadUpdatedExcel(buffer) {
  const approved = S.requests.filter(r => r.status==='approved');
  const wb = XLSX.read(buffer);
  const ws = wb.Sheets['Master'];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  const today = new Date().toLocaleDateString('ko-KR');
  approved.forEach(req => {
    for (let i=1; i<rows.length; i++) {
      const row = rows[i];
      if (!row) continue;
      if (String(row[3]??'').trim() === req.studentId) {
        ws[XLSX.utils.encode_cell({r:i,c:6})]  = {t:'s', v:req.desiredRoom};
        ws[XLSX.utils.encode_cell({r:i,c:7})]  = {t:'n', v:req.desiredSeat};
        ws[XLSX.utils.encode_cell({r:i,c:13})] = {t:'s', v:`${req.desiredRoom} ${req.desiredSeat}`};
        ws[XLSX.utils.encode_cell({r:i,c:14})] = {t:'s', v:today};
        break;
      }
    }
  });
  const out = XLSX.write(wb, {type:'array', bookType:'xlsx'});
  const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `퀀텀관_마스터_업데이트_${today.replace(/\. /g,'-').replace('.','')}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ================================================
   좌석 계산
   ================================================ */
function getOccupied(room, min, max) {
  const s = new Set();
  S.students.filter(st => st.room===room && st.seat>=min && st.seat<=max).forEach(st => s.add(st.seat));
  S.requests.filter(r => r.desiredRoom===room && r.desiredSeat>=min && r.desiredSeat<=max
    && (r.status==='pending'||r.status==='approved')).forEach(r => s.add(r.desiredSeat));
  return s;
}

function getRoomStats() {
  return ROOM_SECTIONS.map(sec => {
    const total = sec.max-sec.min+1;
    const occ   = S.students.filter(s => s.room===sec.room && s.seat>=sec.min && s.seat<=sec.max).length;
    const pend  = S.requests.filter(r => r.desiredRoom===sec.room && r.desiredSeat>=sec.min && r.desiredSeat<=sec.max && r.status==='pending').length;
    return {...sec, total, occupied:occ, available:total-occ, pending:pend};
  });
}

  else if (S.page==='student') app.innerHTML = renderStudent();

}

/* --- Student Page --- */

/* ================================================
   이벤트 바인딩
   ================================================ */
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleClick);
  });
  const si = document.getElementById('search-input');
  if (si) si.addEventListener('keydown', e=>{ if(e.key==='Enter'){S.searchQ=si.value;doSearch();} });
  const ri = document.getElementById('req-reason');
  if (ri) ri.addEventListener('input', e=>{ S.reason=e.target.value; });
  const fi = document.getElementById('file-input');
  if (fi) fi.addEventListener('change', handleUpload);
  const di = document.getElementById('dl-input');
  if (di) di.addEventListener('change', handleDownloadUpload);
  const ae = document.getElementById('admin-email');
  if (ae) ae.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('admin-pw')?.focus(); });
  const ap = document.getElementById('admin-pw');
  if (ap) ap.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdminLogin(); });
  // 반려 사유 input
  document.querySelectorAll('[id^="rr-"]').forEach(el => {
    const id = el.id.replace('rr-','');
    el.addEventListener('input', e=>{ S.rejectTexts[id]=e.target.value; });
  });
}

async function handleClick(e) {
  const btn = e.currentTarget;
  const action = btn.dataset.action;
  if (!action) return;

  if (action==='goto-student') {
    S.page='student'; S.searchQ=''; S.foundStudent=null; S.searchErr='';
    S.showForm=false; S.selSection=null; S.selSeat=null; S.reason='';
    S.submitted=false; S.myRequests=[];
    render();
  }
  else if (action==='goto-admin') {
    S.page='admin';
    if (S.adminUser) subscribeRequests();
    render();
  }
  else if (action==='goto-landing') {
    S.page='landing';
    if (S.reqListener) { S.reqListener(); S.reqListener=null; }
    render();
  }
  else if (action==='do-search') {
    const si=document.getElementById('search-input');
    if(si) S.searchQ=si.value;
    doSearch();
  }
  else if (action==='toggle-form') {
    S.showForm=!S.showForm; S.selSection=null; S.selSeat=null; S.reason='';
    render();
  }
  else if (action==='sel-section') {
    S.selSection=ROOM_SECTIONS[parseInt(btn.dataset.idx)];
    S.selSeat=null;
    render();
  }
  else if (action==='sel-seat') {
    S.selSeat=parseInt(btn.dataset.seat);
    render();
  }
  else if (action==='submit-req') {
    const ri=document.getElementById('req-reason');
    if(ri) S.reason=ri.value;
    doSubmit();
  }
  else if (action==='do-login') {
    doAdminLogin();
  }
  else if (action==='do-logout') {
    await auth.signOut();
    S.adminUser=null;
    if (S.reqListener){S.reqListener();S.reqListener=null;}
    render();
  }
  else if (action==='set-tab') {
    S.adminTab=btn.dataset.tab;
    if (S.adminTab==='dashboard' && !S.studentsLoaded) loadDashboard();
    S.showRejectFor=null;
    render();
  }
  else if (action==='set-filter') {
    S.filterStatus=btn.dataset.filter; S.showRejectFor=null; render();
  }
  else if (action==='approve') {
    const id=btn.dataset.id;
    const req=S.requests.find(r=>r.id===id);
    if (!req) return;
    S.actionLoading[id]=true; render();
    try { await approveRequestFB(id, req); }
    catch(e){ alert('오류: '+e.message); }
    finally { S.actionLoading[id]=false; }
  }
  else if (action==='show-reject') {
    S.showRejectFor=btn.dataset.id; render();
  }
  else if (action==='confirm-reject') {
    const id=btn.dataset.id;
    const ri=document.getElementById(`rr-${id}`);
    if(ri) S.rejectTexts[id]=ri.value;
    S.actionLoading[id]=true; render();
    try { await rejectRequestFB(id, S.rejectTexts[id]||''); S.showRejectFor=null; }
    catch(e){ alert('오류: '+e.message); }
    finally { S.actionLoading[id]=false; }
  }
  else if (action==='trigger-upload') {
    document.getElementById('file-input').click();
  }
  else if (action==='trigger-download') {
    document.getElementById('dl-input').click();
  }
}

async function doSearch() {
  const q = S.searchQ.trim();
  if (!q) return;
  S.searchLoading=true; S.searchErr=''; S.foundStudent=null; S.myRequests=[];
  render();
  try {
    const found = await searchStudentFB(q);
    if (found) {
      S.foundStudent=found;
      S.myRequests=await loadStudentRequests(found.id);
      S.showForm=false; S.submitted=false;
    } else {
      S.searchErr='학생을 찾을 수 없습니다. 학번 또는 이름을 확인해주세요.';
    }
  } catch(e) { S.searchErr='검색 중 오류가 발생했습니다: '+e.message; }
  finally { S.searchLoading=false; render(); }
}

async function doSubmit() {
  const s=S.foundStudent;
  if (!s||!S.selSection||!S.selSeat||!S.reason.trim()) return;
  const hasPending = S.myRequests.some(r=>r.studentId===s.id&&r.status==='pending');
  if (hasPending) return;
  S.submitLoading=true; render();
  try {
    await submitRequestFB({
      studentId:s.id, studentName:s.name, gender:s.gender,
      currentRoom:s.room, currentSeat:s.seat,
      desiredRoom:S.selSection.room, desiredSeat:S.selSeat,
      reason:S.reason.trim(),
    });
    S.submitted=true; S.showForm=false;
    S.myRequests=await loadStudentRequests(s.id);
  } catch(e){ alert('신청 중 오류: '+e.message); }
  finally { S.submitLoading=false; render(); }
}

async function doAdminLogin() {
  const email=(document.getElementById("admin-email")?.value||"").trim();
  const pw=document.getElementById("admin-pw")?.value||"";
  const errEl=document.getElementById("login-err");
  if(!email||!pw){if(errEl)errEl.textContent="이메일과 비밀번호를 입력해주세요.";return;}
  if(errEl)errEl.textContent="로그인 중...";
  try{
    await auth.signInWithEmailAndPassword(email,pw);
  }catch(e){
    console.error("login error:",e.code,e.message);
    const msg={"auth/invalid-credential":"이메일 또는 비밀번호가 올바르지 않습니다.","auth/wrong-password":"비밀번호가 올바르지 않습니다.","auth/user-not-found":"존재하지 않는 이메일입니다.","auth/too-many-requests":"로그인 시도 초과. 잠시 후 다시 시도해주세요.","auth/invalid-email":"올바른 이메일 형식이 아닙니다."};
    if(errEl)errEl.textContent=msg[e.code]||("오류: "+e.code);
  }
}

async function loadDashboard() {
  S.dashLoading=true; render();
  try {
    S.students=await loadAllStudentsFB();
    S.studentsLoaded=true;
  } catch(e){ console.error(e); }
  finally { S.dashLoading=false; render(); }
}

async function handleUpload(e) {
  const file=e.target.files[0];
  if (!file) return;
  S.uploadLoading=true; S.uploadErr=''; S.uploadMsg=''; render();
  const reader=new FileReader();
  reader.onload=async evt=>{
    const {students, error}=parseExcel(evt.target.result);
    if (error){ S.uploadErr=error; S.uploadLoading=false; render(); return; }
    if (!students.length){ S.uploadErr='학생 데이터를 찾을 수 없습니다.'; S.uploadLoading=false; render(); return; }
    try {
      await saveStudentsFB(students);
      S.students=students; S.studentsLoaded=true;
      S.uploadMsg=`✅ ${students.length}명 저장 완료 (Firebase 업데이트됨)`;
    } catch(e){ S.uploadErr='Firebase 저장 오류: '+e.message; }
    finally { S.uploadLoading=false; render(); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

async function handleDownloadUpload(e) {
  const file=e.target.files[0];
  if (!file) return;
  const reader=new FileReader();
  reader.onload=async evt=>{
    try { await downloadUpdatedExcel(evt.target.result); }
    catch(e){ alert('다운로드 오류: '+e.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

/* ================================================
   Auth 상태 감지 → 초기화
   ================================================ */
auth.onAuthStateChanged(user => {
  S.adminUser = user;
  if (user && S.page==='admin') {
    subscribeRequests();
    if (!S.studentsLoaded) loadDashboard();
  }
  render();
});
</script>
